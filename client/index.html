<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Grocery App</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 20px; }
    .item { margin-bottom: 10px; }
    table { border-collapse: collapse; width: 50%; }
    th, td { border: 1px solid #ccc; padding: 4px; }
  </style>
</head>
<body>
  <h1>Grocery Items</h1>
  <div id="items"></div>

  <h2>Cart</h2>
  <table>
    <thead>
      <tr><th>Item</th><th>Qty</th><th>Price</th><th></th></tr>
    </thead>
    <tbody id="cart"></tbody>
  </table>
  <p>Total: $<span id="total">0</span></p>

  <script>
    async function loadItems() {
      const res = await fetch('http://localhost:3001/items');
      const data = await res.json();
      const list = document.getElementById('items');
      data.forEach(item => {
        const div = document.createElement('div');
        div.className = 'item';
        const btn = document.createElement('button');
        btn.textContent = 'Add';
        btn.onclick = () => addToCart(item.id);
        div.textContent = `${item.name} - $${item.price} `;
        div.appendChild(btn);
        list.appendChild(div);
      });
    }

    async function loadCart() {
      const res = await fetch('http://localhost:3001/cart');
      const data = await res.json();
      const tbody = document.getElementById('cart');
      tbody.innerHTML = '';
      data.forEach(item => {
        const tr = document.createElement('tr');
        tr.innerHTML = `<td>${item.name}</td><td>${item.quantity}</td><td>$${item.price*item.quantity}</td>`;
        const tdBtn = document.createElement('td');
        const btn = document.createElement('button');
        btn.textContent = 'Remove';
        btn.onclick = () => removeFromCart(item.id);
        tdBtn.appendChild(btn);
        tr.appendChild(tdBtn);
        tbody.appendChild(tr);
      });

      const totalRes = await fetch('http://localhost:3001/cart/total');
      const { total } = await totalRes.json();
      document.getElementById('total').textContent = total.toFixed(2);
    }

    async function addToCart(id) {
      await fetch('http://localhost:3001/cart', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ id, quantity: 1 })
      });
      loadCart();
    }

    async function removeFromCart(id) {
      await fetch(`http://localhost:3001/cart/${id}`, { method: 'DELETE' });
      loadCart();
    }

    loadItems();
    loadCart();
  </script>
</body>
</html>
